"$schema" = "https://starship.rs/config-schema.json"
scan_timeout = 100
command_timeout = 500
follow_symlinks = false
add_newline = false
palette = "catppuccin_mocha"

format = """
$username\
$directory\
${custom.giturl}\
$git_branch\
${custom.git_worktree}\
$git_status\
$fill\
$all\
$time\
$line_break\
$character\
"""
right_format = """"""

[directory]
style = "teal"
format = "[ $path ]($style)"
truncation_length = 4

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¯░ø "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "
"Others" = "´çÉ "

[username]
disabled = false
show_always = true
style_user = "bg:surface0 fg:text"
style_root = "bg:surface0 fg:text"
format = "[´îâ $user ]($style)"

[line_break]
disabled = false

[character]
disabled = false
success_symbol = "[¯ŞÑ ](bold fg:green)"
error_symbol = "[Ô£İ ](bold fg:red)"
vimcmd_symbol = "[: ](bold fg:yellow)"

[package]
disabled = false

[time]
disabled = true
time_format = "%R"
format = "[   [ ´É║ $time ](fg:yellow bg:foam)]($style)"

[custom.giturl]
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL="´Éê "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL="´èû "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL="´à▒ "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL="´Şí "
else
    GIT_REMOTE_SYMBOL="´çÆ "
fi
echo "$GIT_REMOTE_SYMBOL "
"""
when = "git rev-parse --is-inside-work-tree 2> /dev/null"
format = "$output"
require_repo = true
ignore_timeout = true

[git_branch]
symbol = "(base)´Éİ "
style = "fg:lavender bg:base"
format =  "  [$symbol$branch]($style)(base)"

# [git_status]
# # MINIMAL git status
# format = " [($all_status$ahead_behind )]($style)"
# ahead    = "Ôçí${count} "
# behind   = "Ôçú${count} "
# diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count} "

[git_status]
format = "[$untracked$staged$modified$renamed$conflicted$ahead_behind ]($style)"
# options available for format
staged     = "[+](green)"
modified   = "[!](yellow)"
renamed    = "[┬╗](blue)"
deleted    = "[-](red)"
untracked  = "[?](red)"
stashed    = "[Ôëí](lavender)"
conflicted = "[Ô£û](red bold)"

ahead      = "[Ôçí${count}](teal)"
behind     = "[Ôçú${count}](peach)"
diverged   = "[ÔçòÔçí${ahead_count}Ôçú${behind_count}](mauve)"

[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = """
if git rev-parse --git-dir >/dev/null 2>&1; then
      common_dir=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
      git_dir=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
      if [ "$common_dir" != "$git_dir" ]; then
            echo "Ôøô "
      fi
fi
"""
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = " ([$output ]($style))"
style = "bold green"
require_repo = true
ignore_timeout = true


